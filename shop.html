<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Shop — Surina Masala | Premium Quality</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
  .shop-hero{padding:160px 0 80px;background:linear-gradient(135deg,var(--yellow-pale), #FAFAFA);text-align:center;}
  .search-input{width:100%;padding:20px 60px 20px 28px;border-radius:var(--r-pill);border:2px solid var(--border-lt);font-size:16px;background:#fff;box-shadow:var(--sh-md);transition:var(--t);}
  .search-input:focus{border-color:var(--yellow);box-shadow:var(--sh-lg);}
  
  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:32px;padding:40px 0 100px;}
  .pcard{background:#fff;border-radius:24px;border:1px solid var(--border-lt);overflow:hidden;transition:var(--t);box-shadow:var(--sh-card);display:flex;flex-direction:column;}
  .pcard:hover{transform:translateY(-8px);box-shadow:var(--sh-md);border-color:var(--border);}
  .pcard-img-wrap{height:220px;overflow:hidden;position:relative;}
  .pcard-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease);}
  .pcard:hover .pcard-img-wrap img{transform:scale(1.05);}
  .discount-badge{position:absolute;top:16px;right:16px;background:var(--red);color:#fff;font-weight:800;font-size:12px;padding:6px 12px;border-radius:var(--r-pill);box-shadow:var(--sh-sm);}
  
  .pcard-body{padding:24px;flex:1;display:flex;flex-direction:column;}
  .pcard-name{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px;}
  .wselector{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
  .wbtn{padding:8px 16px;border:1px solid var(--border);border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;background:#FAFAFA;color:var(--ink-3);transition:var(--t);}
  .wbtn.on,.wbtn:hover{border-color:var(--red);background:#FFF0F0;color:var(--red);}
  
  .price-box{display:flex;align-items:baseline;gap:8px;margin-bottom:20px;}
  .mrp{color:#9CA3AF;text-decoration:line-through;font-weight:600;font-size:14px;}
  .sell{font-family:var(--font-display);color:var(--red);font-size:28px;font-weight:800;}
  
  .action-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:auto;}
  .action-row{display:flex;gap:10px;}
</style>
</head>
<body>
<!-- HDR (Standard structure omitted for brevity, use identical header as provided in original code but it will inherit the new CSS) -->
<header class="hdr" id="hdr">
  <div class="wrap hdr-inner">
    <a href="index.html" class="logo">
      <div class="logo-badge">🌶️</div>
      <div class="logo-words"><span class="logo-primary">Surina</span><span class="logo-secondary">Masala</span></div>
    </a>
    <nav class="hdr-nav" id="nav">
      <ul class="nav-ul">
        <li><a href="index.html" class="nav-a">🏠 Home</a></li>
        <li><a href="shop.html" class="nav-a active">🛍️ Shop</a></li>
        <li><a href="distributor.html" class="nav-a">🤝 Distributor</a></li>
      </ul>
    </nav>
    <button class="hdr-cart-btn" style="border:none;background:var(--yellow-pale);padding:10px 16px;border-radius:14px;font-weight:800" onclick="toggleCart()">🛒 Cart <span data-cart-count style="color:var(--red);margin-left:4px">0</span></button>
  </div>
</header>

<section class="shop-hero">
  <div class="wrap">
    <h1 style="font-family:var(--font-display);font-size:48px;color:var(--ink);font-weight:800">🛍️ Premium Masala Shop</h1>
    <p class="sub center" style="margin-top:10px">10% se 50% tak ki chhoot. Factory se seedha aapki kitchen mein.</p>
    <div style="max-width:600px;margin:0 auto;position:relative">
      <input type="text" class="search-input" id="searchInput" placeholder="Search masale... (eg. Haldi, Biryani)"/>
    </div>
  </div>
</section>

<section class="wrap"><div class="prod-grid" id="shopGrid"></div></section>

<!-- Cart Drawer included automatically by App.js -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-hdr"><h3>🛒 Your Cart</h3><button onclick="closeCart()" style="border:none;background:none;font-size:20px;cursor:pointer">✕</button></div>
  <div id="cartSavings" style="background:#E8F5E9;color:#2E7D32;padding:12px 28px;font-size:13px;font-weight:700;text-align:center;display:none;">
    🎉 You are saving <span id="cartSavingsValue"></span> on this order!
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-tot">Total Payable: <strong data-cart-total>₹0</strong></div>
    <button class="btn btn-wa fw" onclick="openCheckout()">Secure Checkout</button>
  </div>
</div>

<script src="app.js"></script>
<script>
let selW={}, selQ={};

function renderShop() {
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = PRODUCTS.map(p => {
    const ws = Object.keys(p.sizes);
    if(!selW[p.id]) selW[p.id] = ws[1]; // default 2nd size
    if(!selQ[p.id]) selQ[p.id] = 1;
    
    const dw = selW[p.id];
    const sData = p.sizes[dw];
    const discount = Math.round(((sData.mrp - sData.price) / sData.mrp) * 100);

    return `
    <div class="pcard reveal vis" id="pc${p.id}">
      <div class="pcard-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy"/>
        <div class="discount-badge" id="bdg${p.id}">${discount}% OFF</div>
      </div>
      <div class="pcard-body">
        <h3 class="pcard-name">${p.name}</h3>
        <p style="font-size:13px;color:var(--ink-3);margin-bottom:12px">${p.desc}</p>
        <div class="wselector">
          ${ws.map(w => `<button class="wbtn${w===dw?' on':''}" onclick="selWeight(${p.id},'${w}',this)">${w}</button>`).join('')}
        </div>
        <div class="price-box">
          <span class="mrp" id="pmrp${p.id}">₹${sData.mrp}</span>
          <span class="sell" id="psell${p.id}">₹${sData.price}</span>
        </div>
        <div class="action-grid">
          <div class="action-row">
            <div style="display:flex;border:1px solid var(--border);border-radius:12px;overflow:hidden">
              <button onclick="chgQ(${p.id},-1)" style="border:none;background:#FAFAFA;padding:0 14px;cursor:pointer;font-weight:800">−</button>
              <span id="qd${p.id}" style="padding:10px 14px;font-weight:700">${selQ[p.id]}</span>
              <button onclick="chgQ(${p.id},1)" style="border:none;background:#FAFAFA;padding:0 14px;cursor:pointer;font-weight:800">+</button>
            </div>
            <button class="btn btn-outline-r fw" style="padding:10px" onclick="addProductToCart(${p.id})">Add to Cart</button>
          </div>
          <button class="btn btn-red fw" onclick="buyNowDirect(${p.id})">⚡ Turant Khareedein</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selWeight(id, w, btn) {
  selW[id] = w;
  document.getElementById('pc'+id).querySelectorAll('.wbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  
  const p = PRODUCTS.find(x=>x.id===id);
  const sData = p.sizes[w];
  const discount = Math.round(((sData.mrp - sData.price) / sData.mrp) * 100);
  
  document.getElementById('pmrp'+id).textContent = '₹' + sData.mrp;
  document.getElementById('psell'+id).textContent = '₹' + sData.price;
  document.getElementById('bdg'+id).textContent = discount + '% OFF';
}

function chgQ(id, d) {
  selQ[id] = Math.max(1, (selQ[id]||1) + d);
  document.getElementById('qd'+id).textContent = selQ[id];
}

function addProductToCart(id) {
  addToCart(id, selW[id], selQ[id]);
}

function buyNowDirect(id) {
  openCheckout(true, id, selW[id], selQ[id]);
}

document.addEventListener('DOMContentLoaded', renderShop);
</script>
</body>
</html>
